<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6DF051" />
      <stop offset="100%" stop-color="#0C8E28" />
    </linearGradient>

    <linearGradient id="gradDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4BCC32" />
      <stop offset="100%" stop-color="#086C1D" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-4" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect id="background" width="100%" height="100%" fill="#050505" />

  <g fill="url(#gradGreen)">
    <rect x="135" y="241" width="12" height="30" rx="6" />
    <rect x="160" y="231" width="12" height="50" rx="6" />
    <rect x="185" y="211" width="12" height="90" rx="6" />
    <rect x="210" y="196" width="12" height="120" rx="6" />

    <rect x="275" y="211" width="12" height="90" rx="6" />
    <rect x="300" y="226" width="12" height="60" rx="6" />
    <rect x="325" y="241" width="12" height="30" rx="6" />
  </g>

  <path 
    d="M 245 155 C 365 155, 420 210, 420 270 C 420 330, 365 385, 245 385 C 310 385, 355 340, 355 270 C 355 200, 320 185, 245 185 Z" 
    fill="url(#gradGreen)" 
    filter="url(#shadow)" 
  />

  <g filter="url(#shadow)">
    <polygon points="215,155 258,155 258,345 234,345 234,175" fill="url(#gradDark)" />
    
    <ellipse cx="212" cy="345" rx="38" ry="28" transform="rotate(-25 212 345)" fill="url(#gradGreen)" />
  </g>
</svg>
